<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="container">

    <!-- SIGN UP -->
    <div id="signUp">

        <button class="back-btn" onclick="goHome()">
            ← Back
        </button>

        <h2>Sign UP</h2>

        <input
                type="FirstName"
                id="FirstName"
                placeholder="FirstName">

        <input
                type="email"
                id="loginEmail"
                placeholder="Email">

        <input
                type="password"
                id="loginPassword"
                placeholder="Password">

        <button onclick="signingUp()">
            SignUp
        </button>

    </div>
</div>

<script src="signup.js"></script>
</body>
</html>
